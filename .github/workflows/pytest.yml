name: pytest

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Run MC + sim_test pytest suite
        run: |
          python -m pytest \
            tests/test_monte_night_bridge.py \
            tests/test_monte_engine_invariants.py \
            tests/test_monte_carlo_report.py \
            tests/test_sim_test_parallel.py \
            tests/test_generator_parallel.py \
            tests/test_mc_action_jitter.py \
            tests/test_monte_repros.py \
            tests/test_stalemate_wins.py \
            tests/test_faction_win_logic.py \
            -q --tb=short
