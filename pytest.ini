[pytest]
testpaths = tests
addopts = -q
filterwarnings =
    ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning
    ignore:'asyncio.get_event_loop_policy' is deprecated:DeprecationWarning
    ignore:'asyncio.set_event_loop_policy' is deprecated:DeprecationWarning
markers =
    fast: default CI smoke + unit tests (exclude slow contract bundles if marked)
    slow: long-running checks (e.g. night sim subprocess)
    night_sim: bounded scripts/sim_test.py fuzz follow-up
    contract: ToS / review static contracts (test_tos_*.py)
    deep_review: DR01–DR15 desired-state contracts (TDD red until fixed)
    leaderboard_review: LB01–LB07 /leaderboard and endgame stats contracts
    reiterating: critical-only CR01–CR53 guards (test_reiterating_regression.py; see tests/critical_issues_registry.py)
    hypothetical: HP01–HP10 potential-issue contracts (test_reiterating_hypothetical.py)
